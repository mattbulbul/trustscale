      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        if (entry.compressed) {

            const reader = ds.readable.getReader();

            writer.close();

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

etter-spacing:-.01em; color:var(--fg);\">TrustScale<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-top:3px;\">Design System<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; color:var(--fg-2); background:var(--card-2); border:1px solid var(--border); border-radius:6px; padding:3px 6px;\">v1.0<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"padding:14px 16px 8px;\">\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); display:flex;\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"16.5\" y1=\"16.5\" x2=\"21\" y2=\"21\"><\u002Fline><\u002Fsvg>\n        <\u002Fspan>\n        <input value=\"{{ navQuery }}\" oninput=\"{{ setNavQuery }}\" placeholder=\"Search the system\" style=\"width:100%; padding:9px 11px 9px 32px; font:500 13px/1 'DM Sans',sans-serif; color:var(--fg); background:var(--card-2); border:1px solid var(--border); border-radius:9px; outline:none;\" style-focus=\"border-color:var(--blue); box-shadow:0 0 0 3px var(--ring); background:var(--card);\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav style=\"flex:1; overflow-y:auto; padding:8px 16px 16px;\">\n      <sc-for list=\"{{ navGroups }}\" as=\"grp\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom:16px;\">\n          <div style=\"font:600 10.5px/1 'JetBrains Mono',monospace; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); padding:6px 10px 8px;\">{{ grp.label }}<\u002Fdiv>\n          <sc-for list=\"{{ grp.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n            <a onclick=\"{{ it.onClick }}\" style e-flex; align-items:center; gap:9px; height:42px; padding:0 15px; background:var(--card); border:1px solid var(--border); border-radius:999px; box-shadow:var(--shadow-md); color:var(--fg-2); cursor:pointer; font:600 12.5px 'DM Sans',sans-serif; transition:color .15s, border-color .15s;\" style-hover=\"color:var(--fg); border-color:var(--border-2);\">\n    <sc-if value=\"{{ isDark }}\" hint-placeholder-val=\"{{ false }}\">\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4.2\"><\u002Fcircle><path d=\"M12 2v2.5M12 19.5V22M22 12h-2.5M4.5 12H2M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8M18.4 18.4l-1.8-1.8M7.4 7.4L5.6 5.6\"><\u002Fpath><\u002Fsvg>\n      <span>Light<\u002Fspan>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ isLight }}\" hint-placeholder-val=\"{{ true }}\">\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M20 14.4A7.5 7.5 0 0 1 9.6 4 7.5 7.5 0 1 0 20 14.4Z\"><\u002Fpath><\u002Fsvg>\n      <span>Dark<\u002Fspan>\n    <\u002Fsc-if>\n  <\u002Fbutton>\n\n  <main style=\"margin-left:272px; min-height:100vh;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:0 60px 180px;\">\n\n      <section id=\"overview\" data-nav=\"\" style=\"padding-top:64px; scroll-margin-top:16px;\">\n        <div style=\"display:inline-flex; align-items:center; gap:8px; padding:5px 11px 5px 6px; background:var(--card); border:1px solid var(--border); border-radius:999px; box-shadow:var(--shadow-sm); margin-bottom:26px;\">\n          <span style=\"display:inline-flex; width:18px; height:18px; border-radius:50%; background:var(--blue-soft); align-items:center; justify-content:center;\"><span style=\"width:6px; height:6px; border-radius:50%; background:var(--blue);\"><\u002Fspan><\u002Fspan>\n          <span style=\"font:600 12px 'DM Sans',sans-serif; color:var(--fg-2);\">The TrustScale brand &amp; product language<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Outfit',sans-serif; font-weight:800; font-size:68px; line-height:.98; letter-spacing:-.035em; margin:0 0 22px; max-width:14ch;\">Trust, built to scale.<\u002Fh1>\n        <p style=\"font-size:19px; line-height:1.62; color:var(--fg-2); max-width:60ch; margin:0 0 34px;\">The complete design system behind TrustScale and its products — <strong style=\"color:var(--fg); font-weight:600;\">Argus<\u002Fstrong> and <strong style=\"color:var(--fg); font-weight:600;\">AutoRL<\u002Fstrong>. Foundations, tokens, components and guidelines, engineered so every surface communicates the same thing: verified, evidence-backed trust.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:56px;\">\n          <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:var(--card); padding:20px 22px;\">\n              <div style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:30px; letter-spacing:-.02em; color:var(--fg);\">{{ s.num }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:var(--muted); margin-top:5px;\">{{ s.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px;\">\n          <sc-for list=\"{{ navCards }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <a onclick=\"{{ c.onClick }}\" style=\"display:block; text-decoration:none; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; cursor:pointer; transition:border-color .16s, box-shadow .16s, transform .16s;\" style-hover=\"border-color:var(--blue-border); box-shadow:var(--shadow-md); transform:translateY(-2px);\">\n              <div style=\"width:38px; height:38px; border-radius:10px; background:var(--blue-soft); color:var(--blue); display:flex; align-items:center; justify-content:center; margin-bottom:14px;\">{{ c.icon }}<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:6px; font-family:'Outfit',sans-serif; font-weight:600; font-size:16.5px; color:var(--fg);\">\n                <span>{{ c.title }}<\u002Fspan>\n                <span style=\"color:var(--faint);\">→<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.5; color:var(--muted); margin-top:5px;\">{{ c.desc }}<\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"brand\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">02 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Brand foundations<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">TrustScale builds the verification layer for AI. Everything in the brand — the shield, the palette, the language — exists to make one promise legible: every claim can be checked against evidence.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:24px; margin-top:44px; align-items:stretch;\">\n          <div style=\"background:var(--fg); color:var(--bg); border-radius:20px; padding:44px; display:flex; flex-direction:column; justify-content:space-between; min-height:300px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; opacity:.55;\">Mission<\u002Fdiv>\n            <p style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:30px; line-height:1.22; letter-spacing:-.02em; margin:26px 0 0;\">Make AI trustworthy at scale — every answer verified against evidence, in real time, before anyone acts on it.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; overflow:hidden;\">\n            <div style=\"position:absolute; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:26px 26px; opacity:.45; mask-image:radial-gradient(circle at 50% 45%, #000, transparent 72%); -webkit-mask-image:radial-gradient(circle at 50% 45%, #000, transparent 72%);\"><\u002Fdiv>\n            <img src=\"8fba4e13-8810-4bc8-8f20-4135d61611a0\" alt=\"TrustScale shield\" style=\"width:104px; height:auto; position:relative; filter:drop-shadow(0 12px 28px rgba(59,130,246,.28));\">\n            <div style=\"position:relative; margin-top:22px; font-family:'Outfit',sans-serif; font-weight:600; font-size:15px;\">The shield<\u002Fdiv>\n            <div style=\"position:relative; margin-top:6px; font-size:13px; color:var(--muted); max-width:30ch; line-height:1.5;\">Two nested layers — the outer guard and the inner check. Protection you can see through.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:64px;\">\n          <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">Logo<\u002Fh3>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 24px; max-width:60ch;\">The primary lockup pairs the shield with the wordmark. Use it wherever space allows. The mark and wordmark may stand alone in constrained or branded contexts.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:18px;\">\n            <div style=\"border:1px solid var(--border); border-radius:16px; overflow:hidden; background:var(--card);\">\n              <div style=\"background:#FFFFFF; padding:44px 40px; display:flex; align-items:center; justify-content:center; min-height:150px;\"><img src=\"8186e492-e51d-48f4-9d9f-cc1e4fe5d2ae\" alt=\"TrustScale primary lockup\" style=\"width:100%; max-width:300px; height:auto;\"><\u002Fdiv>\n              <div style=\"padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;\"><span style=\"font:600 13px 'DM Sans',sans-serif;\">Primary lockup<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">Default<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--border); border-radius:16px; overflow:hidden; background:var(--card);\">\n              <div style=\"background:#FFFFFF; padding:44px 40px; display:flex; align-items:center; justify-content:center; min-height:150px;\"><img src=\"8fba4e13-8810-4bc8-8f20-4135d61611a0\" alt=\"Shield mark\" style=\"height:74px; width:auto;\"><\u002Fdiv>\n              <div style=\"padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;\"><span style=\"font:600 13px 'DM Sans',sans-serif;\">Mark<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">App / favicon<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--border); border-radius:16px; overflow:hidden; background:var(--card);\">\n              <div style=\"background:#FFFFFF; padding:44px 30px; display:flex; align-items:center; justify-content:center; min-height:150px;\"><span style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:26px; letter-spacing:.02em; color:#0B0F1A;\">TRUSTSCALE<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;\"><span style=\"font:600 13px 'DM Sans',sans-serif;\">Wordmark<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">Outfit 700<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px; margin-top:24px;\">\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"font:600 13px 'DM Sans',sans-serif; margin-bottom:4px;\">Clear space<\u002Fdiv>\n            <div style=\"font-size:13px; color:var(--muted); margin-bottom:20px;\">Keep a margin equal to the height of the shield on all sides. Nothing intrudes.<\u002Fdiv>\n            <div style=\"background:#FFFFFF; border-radius:12px; padding:34px; display:flex; align-items:center; justify-content:center;\">\n              <div style=\"border:1.5px dashed var(--blue-border); padding:26px; border-radius:8px;\"><img src=\"8186e492-e51d-48f4-9d9f-cc1e4fe5d2ae\" alt=\"\" style=\"height:34px; width:auto; display:block;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"font:600 13px 'DM Sans',sans-serif; margin-bottom:4px;\">Minimum size<\u002Fdiv>\n            <div style=\"font-size:13px; color:var(--muted); margin-bottom:20px;\">Never render the lockup below 120px wide, or the mark below 20px, to protect legibility.<\u002Fdiv>\n            <div style=\"background:#FFFFFF; border-radius:12px; padding:26px 34px; display:flex; align-items:flex-end; gap:30px; justify-content:center;\">\n              <div style=\"text-align:center;\"><img src=\"8186e492-e51d-48f4-9d9f-cc1e4fe5d2ae\" alt=\"\" style=\"width:120px; height:auto; display:block;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#8A93A6; margin-top:10px;\">120px min<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center;\"><img src=\"8fba4e13-8810-4bc8-8f20-4135d61611a0\" alt=\"\" style=\"height:22px; width:auto; display:block; margin:0 auto;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#8A93A6; margin-top:10px;\">20px min<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:44px;\">\n          <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">Logo misuse<\u002Fh3>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 24px; max-width:60ch;\">The lockup is fixed. These are the six ways it most often breaks.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px;\">\n            <sc-for list=\"{{ misuse }}\" as=\"m\" hint-placeholder-count=\"6\">\n              <div style=\"border:1px solid var(--border); border-radius:14px; overflow:hidden; background:var(--card);\">\n                <div style=\"background:#FFFFFF; height:104px; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:16px;\"><img src=\"8186e492-e51d-48f4-9d9f-cc1e4fe5d2ae\" alt=\"\" style=\"{{ m.imgStyle }}\"><\u002Fdiv>\n                <div style=\"padding:12px 15px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px;\">\n                  <span style=\"display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:rgba(229,53,43,.13); color:var(--red); font-size:12px; flex:0 0 auto;\">✕<\u002Fspan>\n                  <span style=\"font-size:13px; color:var(--fg-2);\">{{ m.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"subbrands\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">03 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Sub-brand architecture<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">TrustScale is a branded house. The mother brand carries the trust; each product earns its own name and a distinct signal color, always endorsed by the shield.<\u002Fp>\n\n        <div style=\"margin-top:48px; background:var(--card-2); border:1px solid var(--border); border-radius:20px; padding:44px 40px;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center;\">\n            <div style=\"background:var(--card); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-sm); padding:16px 26px; display:flex; align-items:center; gap:12px;\">\n              <img src=\"8fba4e13-8810-4bc8-8f20-4135d61611a0\" alt=\"\" style=\"width:26px; height:29px;\">\n              <div style=\"text-align:left;\"><div style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:17px;\">TrustScale<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);\">Master brand<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <svg width=\"440\" height=\"52\" viewBox=\"0 0 440 52\" style=\"display:block;\">\n              <line x1=\"220\" y1=\"0\" x2=\"220\" y2=\"20\" stroke=\"var(--border-2)\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"120\" y1=\"20\" x2=\"320\" y2=\"20\" stroke=\"var(--border-2)\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"120\" y1=\"20\" x2=\"120\" y2=\"52\" stroke=\"var(--border-2)\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"320\" y1=\"20\" x2=\"320\" y2=\"52\" stroke=\"var(--border-2)\" stroke-width=\"2\"><\u002Fline>\n            <\u002Fsvg>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:26px; width:100%; max-width:760px;\">\n              <div style=\"background:var(--card); border:1px solid var(--border); border-radius:16px; padding:26px; box-shadow:var(--shadow-sm);\">\n                <div style=\"background:#FFFFFF; border-radius:10px; padding:22px 24px; display:flex; align-items:center; justify-content:center; min-height:72px;\"><img src=\"a4eb32b4-3a11-4017-a6e2-a298efd47031\" alt=\"Argus\" style=\"height:34px; width:auto;\"><\u002Fdiv>\n                <div style=\"display:flex; gap:5px; margin:18px 0 14px;\"><span style=\"width:38px; height:7px; border-radius:3px; background:#33A65B;\"><\u002Fspan><span style=\"width:38px; height:7px; border-radius:3px; background:#F6B900;\"><\u002Fspan><span style=\"width:38px; height:7px; border-radius:3px; background:#E5352B;\"><\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:14px; line-height:1.55; color:var(--fg-2);\">Real-time AI hallucination detection. A free Chrome extension that verifies ChatGPT, Gemini and Claude answers against live evidence.<\u002Fdiv>\n                <div style=\"margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">Signal: verification traffic-light<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:var(--card); border:1px solid var(--border); border-radius:16px; padding:26px; box-shadow:var(--shadow-sm);\">\n                <div style=\"background:#FFFFFF; border-radius:10px; padding:22px 24px; display:flex; align-items:center; justify-content:center; min-height:72px;\"><img src=\"fd08cac9-c3be-4b34-ac09-618212f205c0\" alt=\"AutoRL\" style=\"height:26px; width:auto;\"><\u002Fdiv>\n                <div style=\"display:flex; gap:5px; margin:18px 0 14px;\"><span style=\"width:38px; height:7px; border-radius:3px; background:#3B82F6;\"><\u002Fspan><span style=\"width:38px; height:7px; border-radius:3px; background:#7BA6F9;\"><\u002Fspan><span style=\"width:38px; height:7px; border-radius:3px; background:#B9CFFB;\"><\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:14px; line-height:1.55; color:var(--fg-2);\">Automated reinforcement learning. The platform that trains and tunes the verification models powering everything TrustScale ships.<\u002Fdiv>\n                <div style=\"margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">Signal: TrustScale blue family<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px; margin-top:24px;\">\n          <div style=\"border:1px solid var(--border); border-radius:14px; background:var(--card); padding:22px;\">\n            <div style=\"font:600 13.5px 'DM Sans',sans-serif; margin-bottom:8px;\">Endorsement<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:var(--muted);\">Products carry their own name first, endorsed by the mother: write <strong style=\"color:var(--fg-2);\">“Argus by TrustScale”<\u002Fstrong> on first mention, then <strong style=\"color:var(--fg-2);\">Argus<\u002Fstrong> alone.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:14px; background:var(--card); padding:22px;\">\n            <div style=\"font:600 13.5px 'DM Sans',sans-serif; margin-bottom:8px;\">Naming<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:var(--muted);\">Product names are single words, lowercase in their own logos, Title Case in body copy. Never invent a third color language per product without approval.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:14px; background:var(--card); padding:22px;\">\n            <div style=\"font:600 13.5px 'DM Sans',sans-serif; margin-bottom:8px;\">Shared DNA<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:var(--muted);\">All three brands share the type system, spacing, radii and components in this document. Only the accent signal changes.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:56px;\">\n          <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">Product logos<\u002Fh3>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 8px; max-width:60ch;\">Argus and AutoRL follow the master brand's rules exactly — a primary lockup, a standalone mark, a standalone wordmark, with equal clear space and minimum sizes.<\u002Fp>\n          \n            <div style=\"margin-top:32px;\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n                <span style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:17px; color:var(--fg);\">Argus<\u002Fspan>\n                <span style=\"font:600 10.5px/1 'JetBrains Mono',monospace; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); background:var(--card-2); border:1px solid var(--border); padding:4px 8px; border-radius:6px; white-space:nowrap;\">Hallucination detection<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px;\">\n                <div style=\"border:1px solid var(--border); border-radius:16px; overflow:hidden; background:var(--card);\">\n                  <div style=\"background:#FFFFFF; padding:40px; display:flex; align-items:center; justify-content:center; min-height:132px;\"><img src=\"a4eb32b4-3a11-4017-a6e2-a298efd47031\" alt=\"Argus lockup\" style=\"width:100%; max-width:260px; height:auto;\"><\u002Fdiv>\n                  <div style=\"padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;\"><span style=\"font:600 13px 'DM Sans',sans-serif;\">Primary lockup<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">Default<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"border:1px solid var(--border); border-radius:16px; overflow:hidden; background:var(--card);\">\n                  <div style=\"background:#FFFFFF; padding:40px; display:flex; align-items:center; justify-content:center; min-height:132px;\"><img src=\"516d7334-9097-4e4b-907d-6c473a185a3f\" alt=\"Argus mark\" style=\"height:54px; width:auto;\"><\u002Fdiv>\n                  <div style=\"padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;\"><span style=\"font:600 13px 'DM Sans',sans-serif;\">Mark<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">App / signal<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"border:1px solid var(--border); border-radius:16px; overflow:hidden; background:var(--card);\">\n                  <div style=\"background:#FFFFFF; padding:40px; display:flex; align-items:center; justify-content:center; min-height:132px;\"><img src=\"9a261667-55b0-4fec-b39c-ef61b1062aed\" alt=\"Argus wordmark\" style=\"height:26px; width:auto;\"><\u002Fdiv>\n                  <div style=\"padding:14px 18px; bo or list=\"{{ neutralScale }}\" as=\"s\" hint-placeholder-count=\"12\">\n              <button onclick=\"{{ s.onClick }}\" style=\"border:none; padding:0; cursor:pointer; background:none; font-family:inherit;\">\n                <div style=\"height:58px; border-radius:8px; background:{{ s.hex }}; border:1px solid rgba(0,0,0,.07);\"><\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:600; color:var(--fg); margin-top:7px;\">{{ s.step }}<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:52px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\"><h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0;\">Verification signal<\u002Fh3><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--green); background:rgba(31,164,99,.12); padding:3px 8px; border-radius:6px;\">Reserved<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 22px; max-width:62ch;\">These three colors mean exactly one thing each and are never used decoratively. This is the Argus traffic-light — the core of TrustScale's product language.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px;\">\n            <sc-for list=\"{{ semantics }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ s.onClick }}\" style=\"text-align:left; border:1px solid var(--border); border-radius:16px; background:var(--card); cursor:pointer; padding:22px; font-family:inherit;\" style-hover=\"box-shadow:var(--shadow-md);\">\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <span style=\"width:40px; height:40px; border-radius:11px; background:{{ x }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">Gradients<\u002Fh3>\n            <p style=\"font-size:15px; color:var(--muted); margin:0 0 18px;\">Directional, 135°, brand hues only.<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n              <sc-for list=\"{{ gradients }}\" as=\"g\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ g.onClick }}\" style=\"text-align:left; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--card); cursor:pointer; padding:0; font-family:inherit;\" style-hover=\"box-shadow:var(--shadow-sm);\">\n                  <div style=\"height:56px; background:{{ g.css }};\"><\u002Fdiv>\n                  <div style=\"padding:10px 12px;\"><div style=\"font:600 13px 'DM Sans',sans-serif; color:var(--fg);\">{{ g.name }}<\u002Fdiv><div style=\"font-size:11.5px; color:var(--muted);\">{{ g.hint }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:52px;\">\n          <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">Accessibility<\u002Fh3>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 22px; max-width:62ch;\">Text meets WCAG AA (4.5:1 body, 3:1 large) against its background. Verified green and Review amber are large-text or icon-paired only.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px;\">\n            <sc-for list=\"{{ contrasts }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"border:1px solid var(--border); border-radius:12px; overflow:hidden;\">\n                <div style=\"background:{{ c.bg }}; color:{{ c.fg }}; padding:20px; font-family:'Outfit',sans-serif; font-weight:600; font-size:18px;\">Aa <span style=\"font-size:13px; font-family:'DM Sans'; font-weight:500; opacity:.85;\">verified<\u002Fspan><\u002Fdiv>\n                <div style=\"padding:11px 14px; background:var(--card); display:flex; align-items:center; justify-content:space-between;\">\n                  <span style=\"font-size:12px; color:var(--fg-2);\">{{ c.label }}<\u002Fspan>\n                  <span style=\"display:flex; align-items:center; gap:6px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);\">{{ c.ratio }}:1<\u002Fspan><span style=\"font:700 10px 'JetBrains Mono',monospace; color:var(--green); background:rgba(31,164,99,.12); padding:2px 6px; border-radius:5px;\">{{ c.grade }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"typography\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">06 — Style<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Typography<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">Three typefaces, three jobs. Outfit leads, DM Sans carries, JetBrains Mono handles every number. The division of labor is strict — it's what keeps the system feeling engineered.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:18px; margin-top:44px;\">\n          <sc-for list=\"{{ faces }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid; grid-template-columns:150px 1fr; gap:28px; align-items:center; border:1px solid var(--border); border-radius:16px; background:var(--card); padding:28px 30px;\">\n              <div style=\"font-family:{{ f.fam }}; font-weight:{{ f.weight }}; font-size:76px; line-height:1; color:var(--fg); text-align:center;\">{{ f.glyph }}<\u002Fdiv>\n              <div>\n                <div style=\"display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;\">\n                  <span style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:22px;\">{{ f.name }}<\u002Fspan>\n                  <span style=\"font:600 11px/1 'JetBrains Mono',monospace; letter-spacing:.1em; text-transform:uppercase; color:var(--blue); background:var(--blue-soft); padding:4px 8px; border-radius:6px;\">{{ f.role }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:14px; color:var(--muted); margin-top:8px; max-width:52ch; line-height:1.5;\">{{ f.body }}<\u002Fdiv>\n                <div style=\"font-family:{{ f.fam }}; font-weight:{{ f.sampleWeight }}; font-size:{{ f.sampleSize }}; color:var(--fg); margin-top:14px;\">{{ f.sample }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:44px;\">\n          <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">Type scale<\u002Fh3>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 20px; max-width:60ch;\">A modular ramp used across every product surface. Headings tighten as they grow; body stays at 1.6 line-height for readability.<\u002Fp>\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); overflow:hidden;\">\n            <sc-for list=\"{{ typeScale }}\" as=\"t\" hint-placeholder-count=\"10\">\n              <div style=\"display:grid; grid-template-columns:130px 1fr auto; gap:24px; align-items:center; padding:18px 24px; border-top:1px solid var(--border);\">\n                <span style=\"font:600 12.5px 'DM Sans',sans-serif; color:var(--fg-2);\">{{ t.name }}<\u002Fspan>\n                <span style=\"{{ t.style }}\">{{ t.text }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted); white-space:nowrap;\">{{ t.spec }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px; margin-top:24px;\">\n          <div style=\"border:1px solid var(--border); border-radius:14px; background:var(--card); padding:22px;\">\n            <div style=\"font:600 13.5px 'DM Sans',sans-serif; margin-bottom:8px;\">Numbers are always mono<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:var(--muted);\">TrustScores, percentages, currency and timestamps use JetBrains Mono so digits align and never shift.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:14px; background:var(--card); padding:22px;\">\n            <div style=\"font:600 13.5px 'DM Sans',sans-serif; margin-bottom:8px;\">One headline face<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:var(--muted);\">Only Outfit sets headlines. Never set a heading in DM Sans or a paragraph in Outfit.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:14px; background:var(--card); padding:22px;\">\n            <div style=\"font:600 13.5px 'DM Sans',sans-serif; margin-bottom:8px;\">Tighten as you grow<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:var(--muted);\">Letter-spacing goes negative above 22px and stays at 0 for body. Never track-out body text.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"spacing\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">07 — Style<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Spacing &amp; grid<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">Everything sits on a 4px grid. Space is a first-class material here — generous whitespace is what makes the system read as precise rather than busy.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:24px; margin-top:44px; align-items:start;\">\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px;\"><span style=\"font:600 14px 'DM Sans',sans-serif;\">Spacing scale<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted);\">base = 4px<\u002Fspan><\u002Fdiv>\n            <sc-for list=\"{{ spacing }}\" as=\"s\" hint-placeholder-count=\"10\">\n              <button onclick=\"{{ s.onClick }}\" style=\"display:grid; grid-template-columns:88px 1fr 44px; gap:14px; align-items:center; width:100%; border:none; background:none; padding:5px 0; cursor:pointer; font-family:inherit;\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--fg-2); text-align:left;\">{{ s.token }}<\u002Fspan>\n                <span style=\"display:block; height:16px; border-radius:4px; background:var(--blue); opacity:.85; width:{{ s.px }}px;\"><\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); text-align:right;\">{{ s.px }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; flex-direction:column; gap:24px;\">\n            <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n              <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:18px;\">Corner radius<\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px;\">\n                <sc-for list=\"{{ radii }}\" as=\"r\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ r.onClick }}\" style=\"border:none; background:none; padding:0; cursor:pointer; text-align:center; font-family:inherit;\">\n                    <div style=\"height:56px; background:var(--blue-soft); border:1.5px solid var(--blue-border); border-radius:{{ r.r }}px;\"><\u002Fdiv>\n                    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--fg); margin-top:8px;\">{{ r.name }}<\u002Fdiv>\n                    <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);\">{{ r.label }}px<\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n              <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:18px;\">Elevation<\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px;\">\n                <sc-for list=\"{{ shadows }}\" as=\"e\" hint-placeholder-count=\"3\">\n                  <div style=\"text-align:center;\">\n                    <div style=\"height:56px; background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:{{ e.sh }};\"><\u002Fdiv>\n                    <div style=\"font:600 12px 'DM Sans',sans-serif; color:var(--fg); margin-top:12px;\">{{ e.name }}<\u002Fdiv>\n                    <div style=\"font-size:11px; color:var(--muted); line-height:1.4; margin-top:3px;\">{{ e.use }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px; margin-top:24px;\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px;\"><span style=\"font:600 14px 'DM Sans',sans-serif;\">Layout grid<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted);\">12 columns · 1160px max · 24px gutter<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(12,1fr); gap:24px;\">\n            <sc-for list=\"{{ cols12 }}\" as=\"c\" hint-placeholder-count=\"12\">\n              <div style=\"height:80px; background:var(--blue-soft); border:1px solid var(--blue-border); border-radius:6px;\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:24px; margin-top:20px; flex-wrap:wrap;\">\n            <div style=\"font-size:13px; color:var(--fg-2);\"><span style=\"color:var(--muted);\">Content max<\u002Fspan> &nbsp;1160px<\u002Fdiv>\n            <div style=\"font-size:13px; color:var(--fg-2);\"><span style=\"color:var(--muted);\">Sidebar<\u002Fspan> &nbsp;272px<\u002Fdiv>\n            <div style=\"font-size:13px; color:var(--fg-2);\"><span style=\"color:var(--muted);\">Gutter<\u002Fspan> &nbsp;24px<\u002Fdiv>\n            <div style=\"font-size:13px; color:var(--fg-2);\"><span style=\"color:var(--muted);\">Section rhythm<\u002Fspan> &nbsp;80px<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"iconography\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">08 — Style<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Iconography &amp; verification<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">One outlined icon family, and one verification language layered on top of it. The traffic-light — green, amber, red — is the most important pattern in the entire system.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px; margin-top:44px; align-items:start;\">\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:28px;\">\n            <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:20px;\">Core icon set<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(6,1fr); gap:12px; color:var(--fg);\">\n              <sc-for list=\"{{ iconRow }}\" as=\"ic\" hint-placeholder-count=\"12\">\n                <div style=\"aspect-ratio:1; border:1px solid var(--border); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:var(--card-2);\">\n                  <span style=\"color:var(--fg);\" data-icon=\"{{ ic.k }}\">{{ ic.svg }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--muted);\">{{ ic.name }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:24px;\">\n            <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:16px;\">Construction<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:12px;\">\n              <div style=\"display:flex; justify-content:space-between; font-size:13px; padding-bottom:12px; border-bottom:1px solid var(--border);\"><span style=\"color:var(--muted);\">Grid<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; color:var(--fg-2);\">24 × 24<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:13px; padding-bottom:12px; border-bottom:1px solid var(--border);\"><span style=\"color:var(--muted);\">Stroke<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; color:var(--fg-2);\">1.9px<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:13px; padding-bottom:12px; border-bottom:1px solid var(--border);\"><span style=\"color:var(--muted);\">Joins<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; color:var(--fg-2);\">round<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:13px;\"><span style=\"color:var(--muted);\">Fill<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; color:var(--fg-2);\">none<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:18px; padding:14px; background:var(--blue-soft); border-radius:10px; font-size:12.5px; line-height:1.5; color:var(--blue-ink);\">Outlined by default. Solid fills are reserved for the active or verified state only.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:52px;\">\n          <h3 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:22px; letter-spacing:-.01em; margin:0 0 6px;\">The verification traffic-light<\u002Fh3>\n          <p style=\"font-size:15px; color:var(--muted); margin:0 0 24px; max-width:64ch;\">Three verdicts, three colors, three icons — locked together. This mapping never changes, across every product and surface.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px;\">\n            <sc-for list=\"{{ verdicts }}\" as=\"v\" hint-placeholder-count=\"3\">\n              <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); overflow:hidden;\">\n                <div style=\"height:5px; background:{{ v.color }};\"><\u002Fdiv>\n                <div style=\"padding:22px;\">\n                  <div style=\"display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:999px; background:{{ v.soft }}; color:{{ v.color }}; font:700 13px 'DM Sans',sans-serif;\">\n                    <span style=\"width:16px; height:16px; border-radius:50%; background:{{ v.color }}; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:10px;\">{{ v.sym }}<\u002Fspan>\n                    {{ v.label }}\n                  <\u002Fdiv>\n                  <div style=\"font-size:13.5px; color:var(--fg-2); margin-top:14px; line-height:1.5;\">{{ v.desc }}<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:14px; padding-top:12px; border-top:1px solid var(--border);\">{{ v.token }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px; margin-top:24px;\">\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:6px;\">The three-bar motif<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:var(--muted); line-height:1.55; margin-bottom:20px;\">Both products carry a stacked three-bar mark. The bars encode each product's signal — verdict states for Argus, the blue family for AutoRL.<\u002Fdiv>\n            <div style=\"display:flex; gap:40px;\">\n              <div>\n                <div style=\"display:flex; flex-direction:column; gap:6px; margin-bottom:12px;\"><span style=\"width:64px; height:10px; border-radius:3px; background:#33A65B;\"><\u002Fspan><span style=\"width:64px; height:10px; border-radius:3px; background:#F6B900;\"><\u002Fspan><span style=\"width:64px; height:10px; border-radius:3px; background:#E5352B;\"><\u002Fspan><\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2);\">Argus<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex; flex-direction:column; gap:6px; margin-bottom:12px;\"><span style=\"width:64px; height:10px; border-radius:3px; background:#3B82F6;\"><\u002Fspan><span style=\"width:64px; height:10px; border-radius:3px; background:#7BA6F9;\"><\u002Fspan><span style=\"width:64px; height:10px; border-radius:3px; background:#B9CFFB;\"><\u002Fspan><\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2);\">AutoRL<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:16px;\">Verdict in context<\u002Fdiv>\n            <div style=\"border:1px solid var(--border); border-radius:12px; padding:16px; background:var(--card-2);\">\n              <div style=\"font-size:13.5px; color:var(--fg-2); line-height:1.5;\">“The Eiffel Tower is 330 metres tall.”<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:14px; border-top:1px solid var(--border);\">\n                <div style=\"display:inline-flex; align-items:center; gap:7px; padding:5px 11px; border-radius:999px; background:rgba(31,164,99,.13); color:var(--green); font:700 12.5px 'DM Sans',sans-serif;\"><span style=\"width:14px; height:14px; border-radius:50%; background:var(--green); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:9px;\">✓<\u002Fspan> Verified<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--fg-2);\">Score <span style=\"color:var(--green); font-weight:600;\">96<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"motion\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">09 — Style<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Motion<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">Motion in TrustScale is quick and literal. It shows what changed and where it came from — then gets out of the way. The one moment we slow down for is the verdict.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px; margin-top:44px;\">\n          <sc-for list=\"{{ motionPrinciples }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:24px;\">\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--blue); font-weight:600;\">{{ p.no }}<\u002Fdiv>\n              <div style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:19px; margin:12px 0 8px;\">{{ p.title }}<\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.55; color:var(--fg-2);\">{{ p.body }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:18px; margin-top:24px; align-items:start;\">\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:18px;\">Duration<\u002Fdiv>\n            <sc-for list=\"{{ durations }}\" as=\"d\" hint-placeholder-count=\"5\">\n              <div style=\"display:grid; grid-template-columns:88px 56px 1fr; gap:12px; align-items:center; padding:10px 0; border-top:1px solid var(--border);\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:var(--fg);\">{{ d.n }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--blue);\">{{ d.ms }}<\u002Fspan>\n                <span style=\"font-size:12.5px; color:var(--muted);\">{{ d.use }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:26px;\">\n            <div style=\"font:600 14px 'DM Sans',sans-serif; margin-bottom:18px;\">Easing<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n              <sc-for list=\"{{ easings }}\" as=\"e\" hint-placeholder-count=\"4\">\n                <div style= x; align-items:center; gap:7px; padding:5px 10px; border-radius:8px; background:var(--card-2); border:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2); position:relative;\">scanning…<\u002Fdiv>\n              <div><div style=\"font:600 13.5px 'DM Sans',sans-serif;\">Evidence scan<\u002Fdiv><div style=\"font-size:12px; color:var(--muted);\">Argus checking sources<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:24px; height:150px; display:flex; flex-direction:column; justify-content:space-between;\">\n              <div style=\"align-self:flex-start; display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:999px; background:rgba(31,164,99,.13); color:var(--green); font:700 13px 'DM Sans',sans-serif; animation:ts-pop 2.4s cubic-bezier(.5,1.5,.4,1) infinite;\"><span style=\"width:15px; height:15px; border-radius:50%; background:var(--green); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:9px;\">✓<\u002Fspan> Verified<\u002Fdiv>\n              <div><div style=\"font:600 13.5px 'DM Sans',sans-serif;\">Verdict reveal<\u002Fdiv><div style=\"font-size:12px; color:var(--muted);\">Spring, 500ms — the one flourish<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:24px; height:150px; display:flex; flex-direction:column; justify-content:space-between;\">\n              <div style=\"align-self:flex-start; position:relative; display:inline-flex;\"><span style=\"width:11px; height:11px; border-radius:50%; background:var(--blue);\"><\u002Fspan><span style=\"position:absolute; inset:0; border-radius:50%; background:var(--blue); animation:ts-ping 1.8s cubic-bezier(0,0,.2,1) infinite;\"><\u002Fspan><\u002Fdiv>\n              <div><div style=\"font:600 13.5px 'DM Sans',sans-serif;\">Live status<\u002Fdiv><div style=\"font-size:12px; color:var(--muted);\">Real-time monitoring pulse<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"buttons\" data-nav=\"\" style=\"border-top:1px solid var(--border); margin-top:80px; padding-top:80px; scroll-margin-top:16px;\">\n        <div style=\"font:600 12px/1 'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px;\">10 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:42px; letter-spacing:-.025em; line-height:1.04; margin:0 0 16px;\">Buttons &amp; CTAs<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.62; color:var(--fg-2); max-width:62ch; margin:0;\">Four levels of emphasis, one gradient reserved for the primary call to action. Hover, focus and press any button below — every state is live.<\u002Fp>\n\n        <div style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:30px; margin-top:44px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:22px;\">Hierarchy<\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:16px; align-items:center;\">\n            <button style=\"display:inline-flex; align-items:center; gap:8px; padding:11px 18px; font:600 14px 'DM Sans',sans-serif; color:#fff; background:var(--blue); border:1px solid transparent; border-radius:10px; cursor:pointer; transition:.14s;\" style-hover=\"filter:brightness(.93);\" style-active=\"filter:brightness(.86); transform:translateY(1px);\" style-focus=\"box-shadow:0 0 0 3px var(--ring); outline:none;\">Primary action<\u002Fbutton>\n            <button style=\"display:inline-flex; align-items:center; gap:8px; padding:11px 18px; font:600 14px 'DM Sans',sans-serif;
